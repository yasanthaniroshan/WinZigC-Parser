name: C++ CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build g++ lcov

      - name: Configure
        run: cmake -G Ninja -B build -DENABLE_COVERAGE=ON

      - name: Build
        run: ninja -C build

      - name: Run tests
        run: ./build/tests
      
      - name: Generate coverage report
        run: lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch

      - name: Remove test files
        run: lcov --remove coverage.info '*/tests/*' -o coverage.info
